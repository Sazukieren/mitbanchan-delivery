<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="밑반찬배달">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FF6B35">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="apple-touch-startup-image" href="icon-512.png">
  <title>밑반찬배달</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --card: #1e2130;
      --accent: #FF6B35;
      --success: #4ade80;
      --danger: #f87171;
      --text: #e8eaf0;
      --text-muted: #9ca3af;
      --border: rgba(255,255,255,0.1);
      --shadow: rgba(0,0,0,0.4);
      --nav-bg: #13151f;
      --input-bg: #0f1117;
      --complete-bg: rgba(74,222,128,0.08);
      --badge-bg: rgba(255,107,53,0.15);
    }
    [data-theme="light"] {
      --bg: #f8f9fa;
      --card: #ffffff;
      --accent: #FF6B35;
      --success: #16a34a;
      --danger: #dc2626;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: rgba(0,0,0,0.1);
      --shadow: rgba(0,0,0,0.15);
      --nav-bg: #ffffff;
      --input-bg: #f3f4f6;
      --complete-bg: rgba(22,163,74,0.08);
      --badge-bg: rgba(255,107,53,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }
    /* Install Banner */
    #install-banner {
      background: linear-gradient(135deg, #FF6B35, #ff8c5a);
      color: #fff;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      flex-shrink: 0;
      z-index: 100;
    }
    #install-banner.hidden { display: none; }
    .banner-text { flex: 1; }
    .banner-text small { display: block; font-size: 11px; opacity: 0.9; margin-top: 2px; }
    #install-banner-btn {
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.5);
      color: #fff;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    #install-dismiss {
      background: none;
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      line-height: 1;
    }
    /* Tab container */
    #tab-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .tab-panel {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: none;
    }
    .tab-panel.active { display: block; }
    #tab-map.active { display: flex; flex-direction: column; overflow: hidden; }
    /* Bottom nav */
    #bottom-nav {
      background: var(--nav-bg);
      border-top: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      cursor: pointer;
      color: var(--text-muted);
      border: none;
      background: none;
      font-family: inherit;
      gap: 3px;
      transition: color 0.2s;
      position: relative;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item.active::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 500; }
    /* List header */
    #list-header {
      padding: 14px 16px 10px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #list-header-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    #today-date { font-size: 15px; font-weight: 700; line-height: 1.4; }
    #tuesday-mode-badge { display:none; background:linear-gradient(135deg,#3b82f6,#6366f1); color:#fff; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; margin-top:4px; }
    #theme-toggle {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
    }
    #progress-container { margin-bottom: 8px; }
    #progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    #progress-bar-track {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    #progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF6B35, #ff4500, #ffaa00);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    #timer-row { display: flex; align-items: center; gap: 10px; }
    #timer-display {
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      flex: 1;
    }
    #timer-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    #timer-btn.running { background: var(--danger); }
    /* Skip panel */
    #skip-panel {
      margin: 8px 12px;
      background: var(--card);
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    #skip-panel-header {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      color: var(--text-muted);
    }
    #skip-panel-body { display: none; padding: 0 14px 10px; }
    #skip-panel-body.open { display: block; }
    .skip-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-top: 1px solid var(--border);
      font-size: 13px;
    }
    .skip-item .skip-name { font-weight: 600; flex: 1; }
    .skip-item .skip-reason {
      background: var(--badge-bg);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }
    .skip-remove-btn {
      color: var(--danger);
      cursor: pointer;
      font-size: 16px;
      border: none;
      background: none;
      padding: 2px 4px;
      line-height: 1;
    }
    /* Cards */
    #cards-container { padding: 8px 12px 20px; }
    .delivery-card {
      background: var(--card);
      border-radius: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: border-color 0.3s, opacity 0.3s, background 0.3s, transform 0.2s;
      box-shadow: 0 4px 16px var(--shadow);
    }
    .delivery-card.just-completed {
      animation: completeCard 0.4s ease forwards;
    }
    @keyframes completeCard {
      0% { transform: scale(1); }
      40% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }
    .delivery-card.completed {
      background: var(--complete-bg);
      border-color: rgba(74,222,128,0.4);
      opacity: 0.85;
    }
    .delivery-card.expanded { border-color: var(--accent); }
    .card-main {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }
    .card-num-badge {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF6B35, #ff4500);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(255,107,53,0.4);
    }
    .delivery-card.completed .card-num-badge { background: linear-gradient(135deg, #4ade80, #22c55e); box-shadow: 0 2px 6px rgba(74,222,128,0.4); }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-addr {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .card-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
    .badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 8px;
      font-weight: 500;
    }
    .badge-parking-1 { background: rgba(74,222,128,0.15); color: #4ade80; }
    .badge-parking-2 { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .badge-parking-3 { background: rgba(248,113,113,0.15); color: #f87171; }
    .badge-service { background: var(--badge-bg); color: var(--accent); }
    .badge-tuesday { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .badge-cctv { background: rgba(248,113,113,0.15); color: #f87171; }
    .card-memo { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-style: italic; }
    .card-complete-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--input-bg);
      color: var(--text-muted);
      font-size: 22px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .delivery-card.completed .card-complete-btn {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }
    .completed-separator {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 8px 0;
      margin: 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .completed-separator::before, .completed-separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    /* Card detail */
    .card-detail {
      display: none;
      padding: 14px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .card-detail.open { display: block; }
    .detail-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }
    .detail-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; margin-top: 2px; }
    .detail-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; font-weight: 500; }
    .detail-link { color: var(--accent); text-decoration: none; font-size: 13px; }
    .detail-textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 10px;
      resize: none;
      min-height: 56px;
      line-height: 1.5;
    }
    .detail-textarea:focus { outline: none; border-color: var(--accent); }
    .parking-buttons { display: flex; gap: 8px; }
    .parking-btn {
      flex: 1;
      padding: 8px 4px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      font-family: inherit;
      transition: all 0.2s;
    }
    .parking-btn.active-1 { border-color: #4ade80; background: rgba(74,222,128,0.15); }
    .parking-btn.active-2 { border-color: #fbbf24; background: rgba(251,191,36,0.15); }
    .parking-btn.active-3 { border-color: #f87171; background: rgba(248,113,113,0.15); }
    .services-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .service-check { display: flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; }
    .service-check input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; }
    .photo-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .photo-thumb-wrap { position: relative; width: 70px; height: 70px; }
    .photo-thumb-wrap img {
      width: 70px; height: 70px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid var(--border);
      cursor: pointer;
    }
    .photo-del-btn {
      position: absolute;
      top: -5px; right: -5px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--danger);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.75; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-warn { background: rgba(251,191,36,0.2); border: 1px solid #fbbf24; color: #fbbf24; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }
    .visit-time-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .visit-time-display { font-size: 12px; color: var(--text-muted); flex: 1; }
    .visit-time-display .vt-val { color: var(--accent); font-weight: 600; }
    .nav-buttons { display: flex; gap: 8px; }
    .nav-buttons .btn { flex: 1; font-size: 11px; }
    .detail-section-title {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    /* Map tab */
    #map-tab-header {
      padding: 10px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #map-tab-header h2 { font-size: 15px; font-weight: 700; }
    #map-container { flex: 1; position: relative; min-height: 0; }
    #kakao-map { width: 100%; height: 100%; min-height: 300px; }
    #map-controls {
      position: absolute;
      bottom: 20px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }
    .map-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px var(--shadow);
    }
    #orientation-btn {
      width: auto;
      border-radius: 20px;
      padding: 0 14px;
      font-size: 12px;
      white-space: nowrap;
      height: 36px;
    }
    /* Stats */
    #tab-stats { padding: 16px; }
    .stats-card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .stats-card-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .stats-summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stats-item { text-align: center; }
    .stats-value { font-size: 22px; font-weight: 700; color: var(--accent); }
    .stats-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .calendar-day-header { text-align: center; font-size: 10px; color: var(--text-muted); font-weight: 600; padding: 4px 0; }
    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      background: var(--input-bg);
      border: 1px solid var(--border);
      font-size: 11px;
      transition: border-color 0.2s;
    }
    .calendar-day:hover { border-color: var(--accent); }
    .calendar-day.today { border-color: var(--accent); background: rgba(255,107,53,0.15); }
    .calendar-day.empty { background: transparent; border-color: transparent; cursor: default; }
    .cal-date { font-size: 11px; font-weight: 600; }
    .cal-count { font-size: 9px; color: var(--success); font-weight: 700; }
    .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; padding: 0 4px; }
    .bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; gap: 4px; }
    .bar-fill { width: 100%; background: linear-gradient(0deg, var(--accent), #ffaa80); border-radius: 4px 4px 0 0; min-height: 4px; }
    .bar-label { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
    .bar-value { font-size: 11px; font-weight: 700; color: var(--accent); }
    /* Settings */
    #tab-settings { padding: 16px; }
    .settings-section { background: var(--card); border-radius: 14px; margin-bottom: 14px; border: 1px solid var(--border); overflow: hidden; }
    .settings-section-title { padding: 12px 16px 0; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .settings-row { padding: 14px 16px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border); }
    .settings-row:first-of-type { border-top: none; }
    .settings-row-label { flex: 1; font-size: 14px; }
    .settings-row-value { font-size: 13px; color: var(--text-muted); }
    .settings-item-row { padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border); }
    .settings-item-row:first-child { border-top: none; }
    .settings-item-info { flex: 1; min-width: 0; }
    .settings-item-name { font-size: 13px; font-weight: 600; }
    .settings-item-addr { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .settings-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .radio-group { display: flex; gap: 12px; padding: 10px 16px 14px; flex-wrap: wrap; }
    .radio-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 14px; }
    .radio-label input[type=radio] { accent-color: var(--accent); width: 16px; height: 16px; }
    /* Modals */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 88vh;
      overflow-y: auto;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-centered {
      background: var(--card);
      border-radius: 16px;
      width: calc(100% - 40px);
      max-width: 420px;
      padding: 20px;
      transform: scale(0.9);
      transition: transform 0.25s;
      align-self: center;
    }
    .modal-overlay.open .modal-centered { transform: scale(1); }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 5px; }
    .modal-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 12px;
    }
    .modal-input:focus { outline: none; border-color: var(--accent); }
    .modal-buttons { display: flex; gap: 10px; margin-top: 16px; }
    .modal-buttons .btn { flex: 1; }
    .reason-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .reason-btn {
      padding: 14px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .reason-btn.selected { border-color: var(--accent); background: rgba(255,107,53,0.15); color: var(--accent); }
    #photo-viewer-img { max-width: 100%; max-height: 70vh; border-radius: 12px; display: block; margin: 0 auto; }
    .day-popup-list { list-style: none; }
    .day-popup-list li { padding: 6px 0; border-top: 1px solid var(--border); font-size: 13px; display: flex; gap: 8px; align-items: center; }
    .day-popup-list li:first-child { border-top: none; }
    /* Toast */
    #toast {
      position: fixed;
      bottom: calc(70px + env(safe-area-inset-bottom) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--success);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 2000;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.toast-error { background: var(--danger); }
    .add-item-btn {
      width: 100%;
      padding: 14px;
      background: rgba(255,107,53,0.08);
      border: 2px dashed var(--accent);
      border-radius: 10px;
      color: var(--accent);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .add-item-btn:hover { background: rgba(255,107,53,0.15); }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .service-stat-row { display: flex; justify-content: space-between; padding: 5px 0; border-top: 1px solid var(--border); font-size: 13px; }
    .service-stat-row:first-child { border-top: none; }
    .top3-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-top: 1px solid var(--border); font-size: 13px; }
    .top3-row:first-child { border-top: none; }
    .top3-rank { width: 24px; height: 24px; border-radius: 50%; background: var(--accent); color: #fff; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    /* Lock Screen */
    #lock-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.4s ease;
    }
    #lock-screen.unlock-fade { opacity: 0; pointer-events: none; }
    #lock-screen.hidden { display: none; }
    #lock-content {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      width: 100%; max-width: 320px; padding: 0 20px;
    }
    #lock-title { font-size: 26px; font-weight: 700; color: var(--text); }
    #lock-subtitle { font-size: 15px; color: var(--text-muted); margin-top: -12px; }
    #pin-dots { display: flex; gap: 20px; }
    .pin-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--accent); background: transparent;
      transition: background 0.15s;
    }
    .pin-dot.filled { background: var(--accent); }
    #pin-error { height: 18px; font-size: 13px; color: var(--danger); font-weight: 600; }
    #keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; width: 100%; }
    .key-btn {
      height: 74px; border-radius: 50%; border: none;
      background: var(--card); color: var(--text);
      font-family: inherit; font-size: 24px; font-weight: 600;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent; border: 1px solid var(--border);
    }
    .key-btn:active { background: var(--accent); color: #fff; transform: scale(0.92); }
    .key-empty { background: transparent; border-color: transparent; cursor: default; }
    .key-empty:active { background: transparent; transform: none; }
    .key-back { font-size: 22px; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%, 45%, 75% { transform: translateX(-10px); }
      30%, 60%, 90% { transform: translateX(10px); }
    }
    #pin-dots.shake { animation: shake 0.45s ease; }
  </style>
</head>

function initFirebase() {

    firebase.initializeApp(firebaseConfig);

    db.ref('/mbc4/items').on('value', function(snap) {
      const val = snap.val();
      if (val === null) {
        const obj = {};
        DEFAULT_ITEMS.forEach(function(item, idx) {
          const toSave = Object.assign({}, item, { order: idx });
          delete toSave.photos;
          delete toSave.photoMemo;
          obj[item.id] = toSave;
        });
        db.ref('/mbc4/items').set(obj);
        fbItems = DEFAULT_ITEMS.slice();
      } else {
        const arr = [];

            item.photos = photoMeta.photos || [];

            item.services = Object.values(item.services);

          arr.push(item);

      }

      checkAllLoaded();
    });

    db.ref('/mbc4/checked').on('value', function(snap) {
      const val = snap.val() || {};

        if (Array.isArray(raw)) {
          fbChecked[date] = raw.filter(function(x) { return x !== null && x !== undefined; });
        } else if (typeof raw === 'object') {
          fbChecked[date] = Object.values(raw).filter(function(x) { return x !== null && x !== undefined; });
        } else {
          fbChecked[date] = [];

      });
      fbLoadedFlags.checked = true;

// ==================== UTILITIES ====================
function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function getToday() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

function formatDateKr(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
}

function formatDateKrFull(d) {
  const days = ['일','월','화','수','목','금','토'];
  const h = d.getHours();
  const m = d.getMinutes();
  const ampm = h < 12 ? '오전' : '오후';
  const h12 = h % 12 || 12;
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]}) ${ampm} ${h12}:${pad(m)}`;
}

function formatMs(ms) {
  const s = Math.floor(ms/1000);
  return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`;
}

function formatMsShort(ms) {
  const m = Math.floor(ms/60000);
  const s = Math.floor((ms%60000)/1000);
  return `${m}분 ${s}초`;
}

function getCurrentTimeStr() {
  const d = new Date();
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ==================== INDEXEDDB ====================
let photoDB = null;

function initPhotoDB() {
  return new Promise((resolve, reject) => {
    try {
      const req = indexedDB.open('mbc4_photos', 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('photos')) db.createObjectStore('photos', {keyPath:'key'});
      };
      req.onsuccess = e => { photoDB = e.target.result; resolve(photoDB); };
      req.onerror = e => reject(e);
    } catch(e) { reject(e); }
  });
}

function dbSave(key, blob) {
  return new Promise((resolve, reject) => {
    if (!photoDB) { reject(new Error('DB not init')); return; }
    const tx = photoDB.transaction('photos','readwrite');
    tx.objectStore('photos').put({key, blob});
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e);
  });
}

function dbLoad(key) {
  return new Promise((resolve, reject) => {
    if (!photoDB) { resolve(null); return; }
    const tx = photoDB.transaction('photos','readonly');
    const req = tx.objectStore('photos').get(key);
    req.onsuccess = () => resolve(req.result ? req.result.blob : null);
    req.onerror = e => reject(e);
  });
}

function dbDelete(key) {
  return new Promise((resolve, reject) => {
    if (!photoDB) { resolve(); return; }
    const tx = photoDB.transaction('photos','readwrite');
    tx.objectStore('photos').delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e);
  });
}

function startTimer() {

  timerRunning = true;
  const btn = document.getElementById('timer-btn');

function updateProgress() {
  const items = loadItems();
  const checked = getTodayChecked();
  const dayOfWeek = new Date().getDay();
  const isTuesdayMode = dayOfWeek === 2;
  const TUESDAY_EXCLUDE_IDS = [9, 10, 11, 12, 13];
  const visibleItems = isTuesdayMode ? items.filter(i => !TUESDAY_EXCLUDE_IDS.includes(i.id)) : items;
  const visibleIds = visibleItems.map(i => i.id);
  const visibleChecked = checked.filter(id => visibleIds.includes(id));
  const total = visibleItems.length;
  const done = visibleChecked.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const emoji = pct === 0 ? '' : pct < 50 ? ' 🔥' : pct < 100 ? ' ⚡' : ' 🎉';
  document.getElementById('progress-text').textContent = `완료 ${done} / 전체 ${total}`;
  document.getElementById('progress-pct').textContent = `${pct}%${emoji}`;
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  if (pct === 100 && total > 0) {
    showCompletionCelebration(done);
  }
}

  document.getElementById('skip-panel-title').textContent = `건너뜀 ${skips.length}건`;

function renderList() {
  if (!fbLoadedFlags.items) {
    const container = document.getElementById('cards-container');
    if (container) container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);">⏳ 데이터 불러오는 중...</div>';
    return;
  }
  const items = loadItems();
  const checked = getTodayChecked();
  const skips = getTodaySkips();
  const skipIds = skips.map(s => s.id);
  const dayOfWeek = new Date().getDay();
  const isTuesdayMode = dayOfWeek === 2;
  const TUESDAY_EXCLUDE_IDS = [9, 10, 11, 12, 13];

  // Show/hide Tuesday mode badge
  const tuesdayBadge = document.getElementById('tuesday-mode-badge');
  if (tuesdayBadge) tuesdayBadge.style.display = isTuesdayMode ? 'inline-block' : 'none';

  updateProgress();
  renderSkipPanel();
  const container = document.getElementById('cards-container');

  // Build display number map: sequential 1-based for visible items
  const visibleItems = isTuesdayMode ? items.filter(i => !TUESDAY_EXCLUDE_IDS.includes(i.id)) : items;
  const displayNumMap = {};
  visibleItems.forEach(function(item, idx) { displayNumMap[item.id] = idx + 1; });

  function getItemDist(item) {
    if (userLat === null) return Infinity;
    const coords = getCoordsByItemId(item.id);
    return calcDistance(userLat, userLng, coords[0], coords[1]);
  }

  let pending = visibleItems.filter(i => !checked.includes(i.id) && !skipIds.includes(i.id));
  let done = visibleItems.filter(i => checked.includes(i.id));

  if (listSortByDistance && userLat !== null) {
    pending.sort((a, b) => getItemDist(a) - getItemDist(b));
    done.sort((a, b) => getItemDist(a) - getItemDist(b));
  }

  let h = '';
  pending.forEach(item => { h += buildCardHtml(item, false, isTuesdayMode, getItemDist(item), displayNumMap[item.id]); });
  if (done.length > 0) {
    h += `<div class="completed-separator">✓ 완료된 배달 ${done.length}건</div>`;
    done.forEach(item => { h += buildCardHtml(item, true, isTuesdayMode, getItemDist(item), displayNumMap[item.id]); });
  }
  container.innerHTML = h;
  if (expandedCardId !== null) {
    const el = document.getElementById('card-' + expandedCardId);
    const det = document.getElementById('detail-' + expandedCardId);
    if (el && det) { el.classList.add('expanded'); det.classList.add('open'); loadPhotosForCard(expandedCardId); }
    else { expandedCardId = null; }
  }
}

  if (level === 2) return '<span class="badge badge-parking-2">🟡주차어려움</span>';
  if (level === 3) return '<span class="badge badge-parking-3">🔴단속카메라</span>';

function buildCardHtml(item, isCompleted, isTuesdayMode, distMeters, displayNum) {
  const tuesdayMark = isTuesdayMode && item.memo && item.memo.includes('화');
  let badges = getParkingBadge(item.parkingLevel);

function getVTDisplay(id) {
  const t = getTodayTimes()[id];
  if (!t) return '방문 기록 없음';
  let s = '';
  if (t.start) s += `도착: <span class="vt-val">${t.start}</span>`;
  if (t.end) {
    s += ` 출발: <span class="vt-val">${t.end}</span>`;
    const [sh,sm] = t.start.split(':').map(Number);
    const [eh,em] = t.end.split(':').map(Number);
    const diff = (eh*60+em)-(sh*60+sm);
    if (diff > 0) s += ` <span style="color:var(--text-muted);">(${diff}분)</span>`;
  }
  return s || '방문 기록 없음';
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  const det = document.getElementById('detail-' + id);
  if (!card || !det) return;
  const isOpen = det.classList.contains('open');
  if (expandedCardId !== null && expandedCardId !== id) {
    const pc = document.getElementById('card-' + expandedCardId);
    const pd = document.getElementById('detail-' + expandedCardId);
    if (pc) pc.classList.remove('expanded');
    if (pd) pd.classList.remove('open');
  }
  if (isOpen) {
    card.classList.remove('expanded'); det.classList.remove('open'); expandedCardId = null;
  } else {
    card.classList.add('expanded'); det.classList.add('open'); expandedCardId = id;
    loadPhotosForCard(id);
  }
}

async function loadPhotosForCard(id) {
  const items = loadItems();
  const item = items.find(i => i.id === id);
  const grid = document.getElementById('pgrid-' + id);
  if (!grid || !item) return;
  const count = item.photos ? item.photos.length : 0;
  if (count === 0) { grid.innerHTML = '<span style="font-size:12px;color:var(--text-muted);">사진 없음</span>'; return; }
  grid.innerHTML = '';
  const today = getToday();
  for (let i = 0; i < count; i++) {
    const key = `${today}_${id}_${i}`;
    try {
      const blob = await dbLoad(key);
      if (blob) {
        const url = URL.createObjectURL(blob);
        objectUrls[key] = url;
        const photoKey = `${id}_${i}`;
        const wrap = document.createElement('div');
        wrap.className = 'photo-thumb-wrap';
        const img = document.createElement('img');
        img.src = url;
        img.alt = `사진 ${i+1}`;
        img.addEventListener('click', () => viewPhoto(url));
        const delBtn = document.createElement('button');
        delBtn.className = 'photo-del-btn';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', () => deletePhoto(id, i));
        wrap.appendChild(img);
        wrap.appendChild(delBtn);
        grid.appendChild(wrap);
      }
    } catch(e) { console.warn('Photo load error:', e); }
  }
  if (grid.children.length === 0) grid.innerHTML = '<span style="font-size:12px;color:var(--text-muted);">사진 없음</span>';
}

async function handlePhotoInput(id, input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const blob = await resizeImage(file, 800, 0.8);
    const items = loadItems();
    const item = items.find(i => i.id === id);
    if (!item) return;
    if (!item.photos) item.photos = [];
    const idx = item.photos.length;
    item.photos.push({ts: Date.now()});
    saveItems(items);
    const key = `${getToday()}_${id}_${idx}`;
    await dbSave(key, blob);
    await loadPhotosForCard(id);
    showToast('📷 사진이 저장되었습니다');
  } catch(e) {
    console.error('Photo save error:', e);
    showToast('사진 저장 실패', true);
  }
  input.value = '';
}

function resizeImage(file, maxW, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function deletePhoto(id, idx) {
  const items = loadItems();
  const item = items.find(i => i.id === id);
  if (!item || !item.photos) return;
  const today = getToday();
  try {
    await dbDelete(`${today}_${id}_${idx}`);
    item.photos.splice(idx, 1);
    for (let i = idx; i < item.photos.length; i++) {
      const blob = await dbLoad(`${today}_${id}_${i+1}`);
      if (blob) { await dbSave(`${today}_${id}_${i}`, blob); await dbDelete(`${today}_${id}_${i+1}`); }
    }
    saveItems(items);
    await loadPhotosForCard(id);
  } catch(e) { console.error('Delete photo error:', e); }
}

function toggleComplete(id) {
  const checked = getTodayChecked();
  const idx = checked.indexOf(id);
  if (idx === -1) {
    checked.push(id);
    setTodayChecked(checked);
    const times = getTodayTimes();
    if (times[id] && times[id].start && !times[id].end) {
      times[id].end = getCurrentTimeStr();
      setTodayTimes(times);
    }
    const item = loadItems().find(i => i.id === id);
    showToast(`✓ ${item ? item.name : ''} 배달 완료!`);
    triggerHaptic();
    playCompleteSound();
    // Card animation
    const cardEl = document.getElementById('card-' + id);
    if (cardEl) {
      cardEl.classList.add('just-completed');
      setTimeout(function() { cardEl.classList.remove('just-completed'); }, 500);
    }
  } else {
    checked.splice(idx, 1);
    setTodayChecked(checked);
    triggerHaptic();
  }
  if (expandedCardId === id) expandedCardId = null;
  renderList();
}

function selectSkipReason(reason) {
  if (!skipModalItemId) return;
  const skips = getTodaySkips();
  const ex = skips.findIndex(s => s.id === skipModalItemId);
  if (ex !== -1) skips.splice(ex, 1);
  skips.push({id: skipModalItemId, reason});
  setTodaySkips(skips);
  const checked = getTodayChecked();
  const ci = checked.indexOf(skipModalItemId);
  if (ci !== -1) { checked.splice(ci, 1); setTodayChecked(checked); }
  const item = loadItems().find(i => i.id === skipModalItemId);

  if (expandedCardId === skipModalItemId) expandedCardId = null;
  closeModal('modal-skip');
  skipModalItemId = null;
  renderList();
}

// ----- Distance helpers -----
function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDistance(meters) {
  if (meters < 1000) return Math.round(meters) + 'm';
  return (meters/1000).toFixed(1) + 'km';
}

// ----- Location tracking -----
function startLocationTracking() {
  if (!navigator.geolocation) return;
  if (watchId !== null) return;
  watchId = navigator.geolocation.watchPosition(
    function(pos) {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      updateMyLocationMarker(userLat, userLng);
      updateDistanceDisplay();
    },
    function() { showToast('위치를 가져올 수 없습니다', true); },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
  );
  const btn = document.getElementById('track-btn');
  if (btn) btn.style.background = '#FF6B35';
}

function stopLocationTracking() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  const btn = document.getElementById('track-btn');
  if (btn) btn.style.background = '';
}

function toggleTracking() {
  if (watchId !== null) {
    stopLocationTracking();
  } else {
    startLocationTracking();
  }
}

// ----- My location marker -----
function buildMyLocationIcon(heading) {
  if ((heading !== null && heading !== undefined && heading !== 0) || compassHeading) {
    const h = heading || compassHeading;
    return L.divIcon({
      className: '',
      html: `<div style="position:relative;width:40px;height:40px;">
        <div style="position:absolute;inset:0;border-radius:50%;background:#3b82f6;opacity:0.9;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.4);"></div>
        <svg style="position:absolute;top:-14px;left:50%;transform:translateX(-50%) rotate(${h}deg);transform-origin:50% calc(100% + 0px);" width="16" height="20" viewBox="0 0 16 20">
          <polygon points="8,0 14,16 8,12 2,16" fill="#3b82f6" stroke="#fff" stroke-width="1.5"/>
        </svg>
      </div>`,
      iconSize: [40, 40],
      iconAnchor: [20, 20]
    });
  }
  return L.divIcon({
    className: '',
    html: `<div style="width:20px;height:20px;border-radius:50%;background:#3b82f6;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.4);"></div>`,
    iconSize: [20, 20],
    iconAnchor: [10, 10]
  });
}

function updateMyLocationMarker(lat, lng) {
  if (!map || lat === null || lng === null) return;
  if (myLocationMarker) map.removeLayer(myLocationMarker);
  myLocationMarker = L.marker([lat, lng], { icon: buildMyLocationIcon(compassHeading) })
    .addTo(map)
    .bindPopup('📍 내 위치');
}

function updateDistanceDisplay() {
  if (userLat === null) return;
  if (currentTab === 'map' && map) refreshMapMarkers();
  if (currentTab === 'list') renderList();
}

// ----- Compass -----
function initCompass() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(function(state) {
      if (state === 'granted') {
        window.addEventListener('deviceorientation', handleOrientation, true);
      }
    });
  } else {
    window.addEventListener('deviceorientation', handleOrientation, true);
  }
}

function handleOrientation(e) {
  // webkitCompassHeading is degrees clockwise from north (iOS/Safari).
  // For non-webkit browsers, alpha is degrees counter-clockwise, so invert with 360 - alpha.
  const heading = e.webkitCompassHeading || (e.alpha ? 360 - e.alpha : 0);
  compassHeading = heading;
  updateMyLocationMarker(userLat, userLng);
}

function requestOrientationPermission() {
  initCompass();
  document.getElementById('orientation-btn').style.display = 'none';
}

// ----- Focus nearest incomplete -----
function focusNearestIncomplete() {
  if (userLat === null || !map) return;
  const items = loadItems();

  let nearest = null;
  let minDist = Infinity;

  items.forEach(function(item, idx) {
    if (isItemCompleted(item.id)) return;
    const coords = getCoordsByItemId(item.id);
    const dist = calcDistance(userLat, userLng, coords[0], coords[1]);
    if (dist < minDist) {
      minDist = dist;
      nearest = { item, coords, dist };
    }
  });

  if (nearest) {
    map.setView(nearest.coords, 16, { animate: true });
    showToast('📍 가장 가까운 미완료: ' + nearest.item.name + ' (' + formatDistance(nearest.dist) + ')');
  }
}

function loadKakaoMap() {
  initLeafletMap();
}

function initKakaoMap() {
  initLeafletMap();
}

function initLeafletMap() {
  if (mapInitialized && map) {
    setTimeout(function() { map.invalidateSize(); }, 100);
    return;
  }
  const container = document.getElementById('kakao-map');
  if (!container) return;
  container.innerHTML = '';

  map = L.map('kakao-map', { zoomControl: true }).setView([37.5012, 127.1273], 14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  mapInitialized = true;
  refreshMapMarkers();
  setTimeout(function() { map.invalidateSize(); }, 300);

  // Show compass button on iOS (requires permission)
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    const ob = document.getElementById('orientation-btn');
    if (ob) ob.style.display = '';
  } else {
    // Android / desktop: start compass automatically
    initCompass();
  }
}

function isItemCompleted(id) {
  return getTodayChecked().includes(id);
}

function refreshMapMarkers() {
  if (!map) return;
  map.eachLayer(function(layer) {
    if (layer instanceof L.Marker || layer instanceof L.CircleMarker) {
      if (layer !== myLocationMarker) map.removeLayer(layer);
    }
  });

  let items = loadItems();

  // Build items array with coords
  let itemsWithCoords = items.map(function(item, idx) {
    return {
      item: item,
      coords: getCoordsByItemId(item.id),
      origIdx: idx
    };
  });

  // Sort by distance if requested and user location available
  if (mapSortByDistance && userLat !== null) {
    itemsWithCoords.sort(function(a, b) {
      return calcDistance(userLat, userLng, a.coords[0], a.coords[1]) -
             calcDistance(userLat, userLng, b.coords[0], b.coords[1]);
    });
  }

  itemsWithCoords.forEach(function(entry, rankIdx) {
    const item = entry.item;
    const coords = entry.coords;
    const completed = isItemCompleted(item.id);
    const color = completed ? '#4ade80' : '#FF6B35';
    const markerNum = mapSortByDistance && userLat !== null ? (rankIdx + 1) : (entry.origIdx + 1);

    const icon = L.divIcon({
      className: '',
      html: '<div style="width:28px;height:28px;border-radius:50%;background:' + color + ';color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4);">' + markerNum + '</div>',
      iconSize: [28, 28],
      iconAnchor: [14, 14]
    });

    const distStr = (userLat !== null)
      ? '<br><small>📏 ' + formatDistance(calcDistance(userLat, userLng, coords[0], coords[1])) + '</small>'
      : '';

    const navHtml = `
<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
  <a href="kakaomap://look?p=${coords[0]},${coords[1]}"
     onclick="if(!window.navigator.standalone && /iPhone|iPad/.test(navigator.userAgent)){this.href='https://map.kakao.com/link/to/${encodeURIComponent(item.name)},${coords[0]},${coords[1]}';}"
     style="flex:1;text-align:center;padding:5px 4px;background:#FAE100;color:#3A1D1D;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none;">🟡 카카오</a>
  <a href="nmap://navigation?dlat=${coords[0]}&dlng=${coords[1]}&dname=${encodeURIComponent(item.name)}&appname=mitbanchan"
     onclick="setTimeout(function(){window.location='https://map.naver.com/v5/directions/-/-/-/walk';},1500)"
     style="flex:1;text-align:center;padding:5px 4px;background:#03C75A;color:#fff;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none;">🟢 네이버</a>
  <a href="https://maps.google.com/?daddr=${coords[0]},${coords[1]}&dirflg=d"
     target="_blank"
     style="flex:1;text-align:center;padding:5px 4px;background:#4285F4;color:#fff;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none;">🔵 구글</a>
</div>`;

    L.marker(coords, {icon: icon})
      .addTo(map)
      .bindPopup('<b>' + escapeHtml(item.name) + '</b><br><small>' + escapeHtml(item.addr) + '</small>' + distStr + navHtml);
  });

  CCTV_LOCATIONS.forEach(function(loc) {
    L.circleMarker([loc.lat, loc.lng], {
      color: '#f87171', fillColor: '#f87171', fillOpacity: 0.8, radius: 8, weight: 2
    }).addTo(map).bindPopup('📷 ' + escapeHtml(loc.name));
  });
}

function centerOnMyLocation() {
  if (!map) { initLeafletMap(); return; }
  if (userLat !== null) {
    map.setView([userLat, userLng], 16);
    updateMyLocationMarker(userLat, userLng);
    return;
  }
  if (!navigator.geolocation) { showToast('위치 권한이 없습니다', true); return; }
  navigator.geolocation.getCurrentPosition(function(pos) {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    map.setView([userLat, userLng], 16);
    updateMyLocationMarker(userLat, userLng);
  }, function() {
    showToast('위치를 가져올 수 없습니다', true);
  });
}

function renderStats() {
  const el = document.getElementById('tab-stats');
  const today = getToday();
  const allChecked = loadChecked();
  const todayChecked = allChecked[today] || [];
  const items = loadItems();
  const allSkips = loadSkips();
  const todaySkips = allSkips[today] || [];
  const timerStart = localStorage.getItem(K.TIMER);
  const elapsed = timerStart ? Date.now() - parseInt(timerStart, 10) : 0;
  const avgMs = todayChecked.length > 0 ? Math.round(elapsed / todayChecked.length) : 0;

  // Cumulative
  let totalDays = 0, totalDelivered = 0;
  Object.keys(allChecked).forEach(d => { if ((allChecked[d]||[]).length > 0) { totalDays++; totalDelivered += allChecked[d].length; } });

  // Service counts
  const svcMap = {};
  items.forEach(it => { (it.services||[]).forEach(s => { svcMap[s] = (svcMap[s]||0) + 1; }); });
  const svcRows = Object.entries(svcMap).map(([s,c]) =>
    `<div class="service-stat-row"><span>${escapeHtml(s)}</span><span style="color:var(--accent);font-weight:700;">${c}명</span></div>`).join('');

  // Top3 fastest times
  const times = loadTimes();
  const fastTimes = [];
  Object.keys(times).forEach(date => {
    const dayT = times[date];
    Object.keys(dayT).forEach(idStr => {
      const t = dayT[idStr];
      if (t.start && t.end) {
        const [sh,sm] = t.start.split(':').map(Number);
        const [eh,em] = t.end.split(':').map(Number);
        const diff = (eh*60+em)-(sh*60+sm);
        if (diff > 0) {
          const it = items.find(i => i.id === parseInt(idStr));
          fastTimes.push({name: it ? it.name : idStr, date, diff});
        }
      }
    });
  });
  fastTimes.sort((a,b) => a.diff - b.diff);
  const top3 = fastTimes.slice(0,3);
  const top3Html = top3.length > 0 ? top3.map((t,i) =>
    `<div class="top3-row"><div class="top3-rank">${i+1}</div><span style="flex:1;">${escapeHtml(t.name)}</span><span style="color:var(--text-muted);font-size:12px;">${t.diff}분</span></div>`).join('')
    : '<div style="font-size:13px;color:var(--text-muted);">데이터 없음</div>';

  el.innerHTML = `
<div id="stats-today" class="stats-card">
  <div class="stats-card-title">오늘 요약</div>
  <div class="stats-summary-grid">
    <div class="stats-item"><div class="stats-value">${todayChecked.length}/${items.length}</div><div class="stats-label">완료/전체</div></div>
    <div class="stats-item"><div class="stats-value">${elapsed > 0 ? formatMs(elapsed) : '--'}</div><div class="stats-label">소요시간</div></div>
    <div class="stats-item"><div class="stats-value">${avgMs > 0 ? formatMsShort(avgMs) : '--'}</div><div class="stats-label">집당 평균</div></div>
    <div class="stats-item"><div class="stats-value">${todaySkips.length}</div><div class="stats-label">건너뜀</div></div>
  </div>
</div>
<div class="stats-card">
  <div class="stats-card-title">최근 30일 캘린더</div>
  <div id="stats-calendar"></div>
</div>
<div class="stats-card">
  <div class="stats-card-title">최근 6개월</div>
  <div id="stats-chart"></div>
</div>
<div class="stats-card">
  <div class="stats-card-title">누적 통계</div>
  <div class="stats-summary-grid" style="margin-bottom:16px;">
    <div class="stats-item"><div class="stats-value">${totalDays}</div><div class="stats-label">총 활동일수</div></div>
    <div class="stats-item"><div class="stats-value">${totalDelivered}</div><div class="stats-label">총 배달완료</div></div>
  </div>
  <div class="stats-card-title">서비스별 등록수</div>
  ${svcRows || '<div style="font-size:13px;color:var(--text-muted);">데이터 없음</div>'}
</div>
<div class="stats-card">
  <div class="stats-card-title">🏆 빠른 배달 TOP 3</div>
  ${top3Html}
</div>`;

  renderCalendar(document.getElementById('stats-calendar'), allChecked);
  renderBarChart(document.getElementById('stats-chart'), allChecked);
}

function renderCalendar(container, allChecked) {
  if (!container) return;
  const today = new Date();
  const todayStr = getToday();
  const dayNames = ['일','월','화','수','목','금','토'];
  const dates = [];
  for (let i = 29; i >= 0; i--) { const d = new Date(today); d.setDate(d.getDate() - i); dates.push(d); }
  const firstDayOfWeek = dates[0].getDay();
  let h = '<div class="calendar-grid">';
  dayNames.forEach(d => { h += `<div class="calendar-day-header">${d}</div>`; });
  for (let i = 0; i < firstDayOfWeek; i++) h += '<div class="calendar-day empty"></div>';
  dates.forEach(d => {
    const ds = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const cnt = (allChecked[ds] || []).length;
    const isToday = ds === todayStr;
    h += `<div class="calendar-day${isToday?' today':''}" onclick="showDayDetail('${ds}')">
      <div class="cal-date">${d.getDate()}</div>
      ${cnt > 0 ? `<div class="cal-count">${cnt}</div>` : ''}
    </div>`;
  });
  h += '</div>';
  container.innerHTML = h;
}

function renderBarChart(container, allChecked) {
  if (!container) return;
  const today = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    const prefix = `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
    let cnt = 0;
    Object.keys(allChecked).forEach(date => { if (date.startsWith(prefix)) cnt += (allChecked[date]||[]).length; });
    months.push({label: `${d.getMonth()+1}월`, cnt});
  }
  const maxCnt = Math.max(...months.map(m => m.cnt), 1);
  let h = '<div class="bar-chart">';
  months.forEach(m => {
    const pct = Math.round(m.cnt / maxCnt * 100);
    h += `<div class="bar-item"><div class="bar-value">${m.cnt}</div><div class="bar-fill" style="height:${pct}%;"></div><div class="bar-label">${m.label}</div></div>`;
  });
  h += '</div>';
  container.innerHTML = h;
}

function showDayDetail(dateStr) {
  const allChecked = loadChecked();
  const allSkips = loadSkips();
  const items = loadItems();
  const dayChecked = allChecked[dateStr] || [];
  const daySkips = allSkips[dateStr] || [];
  const d = new Date(dateStr);
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('day-modal-title').textContent =
    `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
  let h = `<div style="margin-bottom:10px;font-size:13px;color:var(--text-muted);">완료: <strong style="color:var(--success);">${dayChecked.length}건</strong> | 건너뜀: <strong style="color:var(--accent);">${daySkips.length}건</strong></div>`;
  h += '<ul class="day-popup-list">';
  items.forEach(it => {
    const done = dayChecked.includes(it.id);
    const sk = daySkips.find(s => s.id === it.id);
    if (done || sk) {
      h += `<li><span style="color:${done?'var(--success)':'var(--accent)'};">${done?'✓':'↷'}</span><span style="flex:1;">${escapeHtml(it.name)}</span>${sk?`<span style="color:var(--accent);font-size:11px;">${escapeHtml(sk.reason)}</span>`:''}</li>`;
    }
  });
  if (dayChecked.length === 0 && daySkips.length === 0) h += '<li style="color:var(--text-muted);">기록 없음</li>';
  h += '</ul>';
  document.getElementById('day-modal-content').innerHTML = h;
  openModal('modal-day');
}

function changePinPassword() {
  const cur = document.getElementById('pw-current').value.trim();
  const nw = document.getElementById('pw-new').value.trim();
  const cf = document.getElementById('pw-confirm').value.trim();
  const msgEl = document.getElementById('pw-change-msg');
  if (cur !== getStoredPin()) {
    msgEl.style.color = 'var(--danger)';
    msgEl.textContent = '현재 비밀번호가 틀렸습니다';
    return;
  }
  if (!/^\d{4}$/.test(nw)) {
    msgEl.style.color = 'var(--danger)';
    msgEl.textContent = '새 비밀번호는 숫자 4자리여야 합니다';
    return;
  }
  if (nw !== cf) {
    msgEl.style.color = 'var(--danger)';
    msgEl.textContent = '새 비밀번호가 일치하지 않습니다';
    return;
  }
  localStorage.setItem(PIN_KEY, nw);
  msgEl.style.color = 'var(--success)';
  msgEl.textContent = '비밀번호가 변경되었습니다 ✓';
  document.getElementById('pw-current').value = '';
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-confirm').value = '';
}

function openEditModal(id) {
  const item = loadItems().find(i => i.id === id);
  if (!item) return;
  document.getElementById('edit-item-id').value = id;
  document.getElementById('edit-name').value = item.name;
  document.getElementById('edit-addr').value = item.addr;
  document.getElementById('edit-phone').value = item.phone;
  document.getElementById('edit-memo').value = item.memo || '';
  document.getElementById('edit-note').value = item.note || '';
  document.querySelectorAll('input[name="edit-parking"]').forEach(r => {
    r.checked = parseInt(r.value) === item.parkingLevel;
  });
  openModal('modal-edit');
}

function saveEditItem() {
  const id = parseInt(document.getElementById('edit-item-id').value);
  const items = loadItems();
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.name = document.getElementById('edit-name').value.trim();
  item.addr = document.getElementById('edit-addr').value.trim();
  item.phone = document.getElementById('edit-phone').value.trim();
  item.memo = document.getElementById('edit-memo').value.trim();
  item.note = document.getElementById('edit-note').value.trim();
  const pr = document.querySelector('input[name="edit-parking"]:checked');
  if (pr) item.parkingLevel = parseInt(pr.value);
  saveItems(items);
  closeModal('modal-edit');
  showToast(`${item.name} 수정 완료`);
  renderList();
  renderSettings();
}

function openAddModal() { openModal('modal-add'); }

function saveNewItem() {
  const name = document.getElementById('add-name').value.trim();
  const addr = document.getElementById('add-addr').value.trim();
  if (!name || !addr) { showToast('이름과 주소를 입력하세요', true); return; }
  const items = loadItems();
  const maxId = items.reduce((m, i) => Math.max(m, i.id), 0);
  const pr = document.querySelector('input[name="add-parking"]:checked');
  const newItem = {
    id: maxId + 1,
    name,
    addr,
    phone: document.getElementById('add-phone').value.trim(),
    memo: document.getElementById('add-memo').value.trim(),
    note: document.getElementById('add-note').value.trim(),
    parkingLevel: pr ? parseInt(pr.value) : 2,
    cctv: false,
    services: ['도시락'],
    photos: [],
    photoMemo: ''
  };
  items.push(newItem);
  saveItems(items);
  ['add-name','add-addr','add-phone','add-memo','add-note'].forEach(id => { document.getElementById(id).value = ''; });
  closeModal('modal-add');
  showToast(`${name} 추가 완료`);
  renderList();
  renderSettings();
}

function moveItemUp(id) {
  const items = loadItems();
  const idx = items.findIndex(i => i.id === id);
  if (idx <= 0) return;
  [items[idx-1], items[idx]] = [items[idx], items[idx-1]];
  saveItems(items);
  renderSettings();
  renderList();
}

function moveItemDown(id) {
  const items = loadItems();
  const idx = items.findIndex(i => i.id === id);
  if (idx < 0 || idx >= items.length - 1) return;
  [items[idx], items[idx+1]] = [items[idx+1], items[idx]];
  saveItems(items);
  renderSettings();
  renderList();
}

function confirmDeleteItem(id) {
  const item = loadItems().find(i => i.id === id);
  openConfirm(`배달지 삭제`, `"${item ? item.name : id}"을(를) 삭제하시겠습니까?`, () => {
    const items = loadItems().filter(i => i.id !== id);
    saveItems(items);
    showToast('삭제 완료');
    renderSettings();
    renderList();
  });
}

function resetToday() {
  openConfirm('오늘 초기화', '오늘의 완료 체크를 모두 초기화하시겠습니까?', () => {
    setTodayChecked([]);
    setTodaySkips([]);
    expandedCardId = null;
    renderList();
    showToast('오늘 기록이 초기화되었습니다');
  });
}

function exportData() {
  const data = {
    items: loadItems(),
    checked: loadChecked(),
    times: loadTimes(),
    skips: loadSkips(),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mitbanchan_${getToday()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('데이터 내보내기 완료');
}

function confirmClearAll() {
  openConfirm('전체 데이터 삭제', '모든 배달 기록과 설정이 삭제됩니다. 정말 삭제하시겠습니까?', () => {
    if (db) {
      db.ref('/mbc4/checked').remove();
      db.ref('/mbc4/times').remove();
      db.ref('/mbc4/skip').remove();
      fbChecked = {};
      fbTimes = {};
      fbSkips = {};
    }
    [K.ITEMS, K.CHECKED, K.TIMES, K.SKIP, K.TIMER, K.ROLE].forEach(k => { try { localStorage.removeItem(k); } catch(e) {} });
    expandedCardId = null;
    timerRunning = false;
    clearInterval(timerInterval);
    renderList();
    renderSettings();
    showToast('모든 데이터가 삭제되었습니다');
  });
}

// ==================== COMPLETION CELEBRATION ====================
const CELEBRATION_KEY = 'mbc4_celebration_shown';

function showCompletionCelebration(doneCount) {
  if (sessionStorage.getItem(CELEBRATION_KEY + '_' + getToday())) return;
  sessionStorage.setItem(CELEBRATION_KEY + '_' + getToday(), '1');
  const timerStart = localStorage.getItem(K.TIMER);
  const elapsed = timerStart ? Date.now() - parseInt(timerStart, 10) : 0;
  const mins = elapsed > 0 ? Math.round(elapsed / 60000) : 0;
  const msgEl = document.getElementById('celebration-message');
  if (msgEl) {
    msgEl.textContent = `총 ${doneCount}명${mins > 0 ? ' · ' + mins + '분 소요' : ''}\n수고하셨습니다! 🍱`;
    msgEl.style.whiteSpace = 'pre-line';
  }
  openModal('modal-celebration');
}

// ==================== ROSTER PHOTO ====================

async function handleRosterUpload(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const blob = await resizeImage(file, 1200, 0.9);
    await dbSave('roster_photo', blob);
    showToast('📋 명단 사진이 저장되었습니다');
    renderSettings();
  } catch(e) {
    console.error('Roster upload error:', e);
    showToast('명단 사진 저장 실패', true);
  }
  input.value = '';
}
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

function modalBgClick(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}

function openConfirm(title, message, callback) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-message').textContent = message;
  confirmCallback = callback;
  openModal('modal-confirm');
}

function runConfirmCallback() {
  closeModal('modal-confirm');
  if (confirmCallback) { confirmCallback(); confirmCallback = null; }
}

// ==================== TOAST ====================
let toastTimer = null;

function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isError ? 'toast-error show' : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2200);
}

// ==================== LOCK SCREEN ====================
const PIN_KEY = 'mbc4_pin';
const SESSION_UNLOCK_KEY = 'mbc4_unlocked';
let pinBuffer = '';

function getStoredPin() {
  return localStorage.getItem(PIN_KEY) || '0240';
}

function pinInput(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updatePinDots();
  if (pinBuffer.length === 4) {
    setTimeout(checkPin, 120);
  }
}

function pinBackspace() {
  if (pinBuffer.length === 0) return;
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot-' + i).classList.toggle('filled', i < pinBuffer.length);
  }
}

function checkPin() {
  if (pinBuffer === getStoredPin()) {
    sessionStorage.setItem(SESSION_UNLOCK_KEY, '1');
    const ls = document.getElementById('lock-screen');
    ls.classList.add('unlock-fade');
    setTimeout(() => ls.classList.add('hidden'), 400);
  } else {
    const dots = document.getElementById('pin-dots');
    dots.classList.add('shake');
    document.getElementById('pin-error').textContent = '비밀번호가 틀렸습니다';
    setTimeout(() => {
      dots.classList.remove('shake');
      document.getElementById('pin-error').textContent = '';
      pinBuffer = '';
      updatePinDots();
    }, 500);
  }
}

function initLockScreen() {
  if (sessionStorage.getItem(SESSION_UNLOCK_KEY) === '1') {
    document.getElementById('lock-screen').classList.add('hidden');
  }
}

// ==================== AUDIO & HAPTIC ====================
let audioCtx = null;

function triggerHaptic() {
  if (navigator.vibrate) try { navigator.vibrate([30, 10, 30]); } catch(e) {}
}

function playCompleteSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(523, ctx.currentTime); // C5
    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1); // E5
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function playBeep() { playCompleteSound(); }

// ==================== SERVICE WORKER ====================
function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(e => console.log('SW reg failed:', e));
  }
}

// ==================== INIT ====================
function init() {
  initLockScreen();
  let savedTheme = localStorage.getItem(K.THEME);
  if (!savedTheme) {
    savedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  applyTheme(savedTheme);
  initPhotoDB().catch(e => console.warn('IndexedDB init failed:', e));
  renderHeader();
  initFirebase();
  renderList();
  checkIOSInstall();
  registerSW();
}

init();
